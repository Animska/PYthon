<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi APP FastAPI</title>
    <link rel='stylesheet' href='miestilo.css'>
    <script defer src="miscript.js"></script>
</head>
<body>
    <header>
        <h1>Mi App FastAPI en AWS</h1>
    </header>
    <main>
        <section class='card'>
            <h2>Saludo personalizado</h2>
            <div class='input-group'>
                <input type='text' id='inputNombre' placeholder='Escribe tu nombre'>
                <button id='btnSaludar'>Saludar</button>
            </div>
            <p id='respuestaSaludo' class='respuesta'></p>
        </section>
        <section class='card'>
            <h2>Listado de productos</h2>
            <button id='btnProductos'>Cargar productos</button>
            <ul id='listaProductos'></ul>
        </section>
    </main>
</body>
</html>
