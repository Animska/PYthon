{% extends "shop/base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm" style="border: 4px solid var(--lego-black); border-radius: 0;">
                <div class="card-header text-center" style="background-color: var(--lego-yellow); border-bottom: 4px solid var(--lego-black);">
                    <h2 style="font-family: 'Bungee', cursive;">¡ÚNETE AL MARKET!</h2>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        {% for field in form %}
                            <div class="mb-3">
                                <label class="fw-bold">{{ field.label }}</label>
                                {{ field }}
                                {% if field.errors %}
                                    <small class="text-danger">{{ field.errors|first }}</small>
                                {% endif %}
                            </div>
                        {% endfor %}
                        <button type="submit" class="btn-lego-red w-100 mt-3">CREAR MI CUENTA</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
